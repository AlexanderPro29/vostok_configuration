# Базовая конфигурация VOSTOK v9.0
# ------------------------
# Файл распространяется под лицензией CC-BY 4.0
# ------------------------
# Плата: Fysetc Spider v2.2 F446
# Драйверы: 7x tmc2209
# Датчик автоуровня: BTT Microprobe
# Доп.оборудование: отсутствует
# https://github.com/FYSETC/FYSETC-SPIDER
#--------------------------------------------------------
#          Оборудование             |      Разъём       |
#-----------------------------------|-------------------|
# Мотор оси X                       | M1 X-MOT          |
# Мотор оси W                       | M2 Y-MOT          |
# Левый мотор оси Y                 | M3 Z-MOT          |
# Правый мотор оси Y                | M4 E0-MOT         |
# Мотор оси Z                       | M5 E1-MOT         |
# Мотор фидера левой головы         | M6 E2-MOT         |
# Мотор фидера правой головы        | M7 E3-MOT         |
# Нагреватель левой головы          | E0 out            |
# Нагреватель правой головы         | E1 out            |
# Нагреватель стола                 | BED out           |
# Термистор левой головы            | TE0               |
# Термистор правой головы           | TE1               |
# Термистор стола                   | TB                |
# Охлаждение хотэнда левой головы   | FAN0              |
# Охлаждение хотэнда правой головы  | FAN1              |
# Охлаждение модели                 | E2 out            |  #https://mellow.klipper.cn/en/docs/ProductDoc/ExtensionBoard/fly-7040/wiring/
# Охлаждение отсека электроники     | FAN2              |
# Концевик оси X                    | X-                |
# Концевик оси W                    | X+                |
# Концевик оси Y левый              | Y-                |
# Концевик оси Y правый             | Y+                |
# Датчик автоуровня                 | BLTouch           |
#--------------------------------------------------------
#
# Двигатели
#########################################################

[stepper motor_x]   #M1 X-MOT
step_pin: PE11
dir_pin: !PE10
enable_pin: !PE9
full_steps_per_rotation: 200

[stepper motor_w] #M2 Y-MOT
step_pin: PD8
dir_pin: !PB12
enable_pin: !PD9
full_steps_per_rotation: 200

[stepper motor_yl] #M3 Z-MOT
step_pin: PD14
dir_pin: !PD13
enable_pin: !PD15
full_steps_per_rotation: 200

[stepper motor_yr] #M4 E0-MOT
step_pin: PD5
dir_pin: PD6
enable_pin: !PD4
full_steps_per_rotation: 200

[stepper motor_z] #M5 E1-MOT
step_pin: PE6
dir_pin: !PC13     #направление вращения
enable_pin: !PE5
full_steps_per_rotation: 200

[extruder]  #M6 E2-MOT
step_pin: PE2
dir_pin: !PE4
enable_pin: !PE3
full_steps_per_rotation: 200

[extruder1] #M7 E3-MOT
step_pin: PD12
dir_pin: !PC4
enable_pin: !PE8
full_steps_per_rotation: 200

#########################################################
# Драйверы
#########################################################

[tmc2209 stepper motor_x]
uart_pin: PE7
run_current: 1.1
stealthchop_threshold: 0
interpolate: False

[tmc2209 stepper motor_w]
uart_pin: PE15
run_current: 1.1
stealthchop_threshold: 0
interpolate: False

[tmc2209 stepper motor_yl]
sense_resistor: 0.110
uart_pin: PD10
run_current: 1.2
stealthchop_threshold: 0
interpolate: False

[tmc2209 stepper motor_yr]
sense_resistor: 0.110
uart_pin: PD7
run_current: 1.2
stealthchop_threshold: 0
interpolate: False

[tmc2209 stepper motor_z]
uart_pin: PC14
run_current: 1.2
stealthchop_threshold: 0

[tmc2209 extruder]
uart_pin: PC15
run_current: 1.2
stealthchop_threshold: 0

[tmc2209 extruder1]
uart_pin: PA15
run_current: 1.2
stealthchop_threshold: 0

#########################################################
# Концевики и датчик автоуровня
#########################################################

[carriage xc]
endstop_pin: ^PB14

[dual_carriage wc]
endstop_pin: ^PA1

[carriage ylc]
endstop_pin: ^PB13

[extra_carriage yrc]
endstop_pin: ^PA2

[probe]
pin: ^!PA0

[output_pin probe_enable]
pin: PA2
value: 0

[gcode_macro PROBE_DEPLOY]
gcode:
    SET_PIN PIN=probe_enable VALUE=1

[gcode_macro PROBE_STOW]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

#########################################################
# Нагреватели и термисторы
#########################################################

[extruder]
heater_pin: PB15
sensor_pin: PC0

[extruder1]
heater_pin: PC8
sensor_pin: PC1

[heater_bed]
heater_pin: PB4
sensor_pin: PB0

#########################################################
# Вентиляторы
#########################################################

[fan]
pin: PB3  # !PD12 у Дмитрия

[heater_fan e0_fan]
pin: PA13

[heater_fan e1_fan]
pin: PA14

[controller_fan electronics_fan]
pin: PB2
